<!DOCTYPE html>

<head>

<style>
:root{
  --m-green:#2E7D32;
  --m-green-hover:#1B5E20;
  --m-green-light:#4CAF50;
  --m-green-soft:#66BB6A;
  --m-green-glow:rgba(46,125,50,0.3);
  --m-bg:#f8f9fa;
  --m-surface:#ffffff;
  --m-border:#e0e0e0;
  --m-text:#1a1a1a;
  --m-text-secondary:#666;

  --shadow:0 2px 12px rgba(0,0,0,0.08);

  height:100%;
  font-family:'Inter',system-ui,sans-serif;
